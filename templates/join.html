<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Join Session</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="join-body">
<script>
(function () {
  var saved = localStorage.getItem("roomcode-theme");
  var theme = saved || ((window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light");
  document.body.classList.add("theme-" + theme);
})();
</script>
  <div class="join-card">
    <h1>RoomCode</h1>
    <p class="join-sub">Enter the session password and a name to join.</p>
    {% if error %}<div class="join-error">{{ error }}</div>{% endif %}
    <form method="POST" action="{{ url_for('join') }}" class="join-form">
      <label for="password">Session password</label>
      <input type="password" id="password" name="password" autofocus required>
      <label for="username">Your name</label>
      <input type="text" id="username" name="username" maxlength="32" required>
      <button type="submit">Join session</button>
    </form>
  </div>
</body>
</html>
